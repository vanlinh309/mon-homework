<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Match Mates! 👯</title>
  <meta name="description" content="Find the two identical objects and circle them!">
  <meta name="theme-color" content="#FF69B4">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
  <script src="sounds.js"></script>
  <script src="sidebar.js"></script>
  <script src="nav.js"></script>
  <script src="assignments/lesson8.js"></script>
  <style>
    body { background: linear-gradient(135deg, #FFF0FB, #FFF9F0); }

    main {
      max-width: 820px;
      margin: 0 auto;
      padding: 12px 14px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .instruction { font-size: 1.1rem; color: #555; text-align: center; }

    /* ── Scene image + drawing canvas ── */
    .scene-wrap {
      position: relative;
      width: 100%;
      border-radius: 18px;
      box-shadow: var(--shadow);
      background: #f5f5f5;
      cursor: crosshair;
    }

    .scene-img {
      width: 100%;
      display: block;
      border-radius: 18px;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .draw-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border-radius: 18px;
      touch-action: none;
    }

    /* ── Drawing toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      background: #fff;
      border-radius: 50px;
      padding: 10px 20px;
      box-shadow: var(--shadow);
    }

    .color-dot {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 3px solid transparent;
      cursor: pointer;
      touch-action: manipulation;
      transition: transform 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    .color-dot:active { transform: scale(0.88); }
    .color-dot.active { border-color: #333; transform: scale(1.15); }

    .tool-btn {
      height: 36px;
      padding: 0 16px;
      border-radius: 50px;
      border: 2px solid #ddd;
      background: #fff;
      font-family: var(--font-main);
      font-size: 0.95rem;
      font-weight: bold;
      cursor: pointer;
      touch-action: manipulation;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    .tool-btn:active  { transform: scale(0.93); }
    .tool-btn.active  { background: #FFF0FB; border-color: var(--color-pink); color: var(--color-pink); }

    .toolbar-sep { width: 1px; height: 28px; background: #ddd; flex-shrink: 0; }

    .btn-clear { border-color: var(--color-orange); color: var(--color-orange); }
    .btn-clear:hover { background: #FFF3E0; }

    /* ── Found them button ── */
    .btn-found {
      font-size: 1.3rem;
      padding: 16px 48px;
      border-radius: 50px;
      background: linear-gradient(135deg, var(--color-pink), var(--color-purple));
      color: #fff;
      border: none;
      font-family: var(--font-main);
      font-weight: bold;
      cursor: pointer;
      touch-action: manipulation;
      box-shadow: 0 4px 0 rgba(0,0,0,0.15);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .btn-found:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 rgba(0,0,0,0.15);
    }

    /* ── Nav row ── */
    .nav-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .btn-nav {
      font-size: 1.05rem;
      padding: 10px 24px;
      border-radius: 50px;
      background: #fff;
      border: 3px solid var(--color-pink);
      color: var(--color-pink);
      font-family: var(--font-main);
      font-weight: bold;
      cursor: pointer;
      touch-action: manipulation;
      transition: background 0.15s, color 0.15s, transform 0.1s;
      min-width: 90px;
    }
    .btn-nav:active { transform: scale(0.93); }
    .btn-nav:hover  { background: var(--color-pink); color: #fff; }
    .btn-nav:disabled { opacity: 0.3; pointer-events: none; }

    .hw-counter { font-size: 1rem; font-weight: bold; color: #888; min-width: 60px; text-align: center; }

    @media (max-width: 500px) {
      .toolbar { padding: 8px 12px; gap: 8px; }
      .color-dot { width: 30px; height: 30px; }
      .tool-btn  { font-size: 0.85rem; padding: 0 12px; height: 32px; }
    }
  </style>
</head>
<body class="lesson-body">

<div class="top-bar">
  <button class="btn-home" onclick="location.href='index.html'">🏠 Home</button>
  <h1>Match Mates! 👯</h1>
  <div class="star-bar">⭐ <span id="star-count">0</span></div>
</div>

<div class="app-layout">

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <button class="sidebar-toggle" id="sidebar-toggle" onclick="toggleSidebar()">›</button>
    <div class="sidebar-inner">
      <div class="sidebar-title">Homework</div>
      <div class="hw-list" id="hw-list"></div>
    </div>
  </div>

  <!-- Main content -->
  <div class="lesson-scroll">
    <main>
      <div class="instruction">Find the two identical objects and circle them! 👀</div>

      <!-- Scene image + drawing overlay -->
      <div class="scene-wrap" id="scene-wrap">
        <img id="scene-img" class="scene-img" src="" alt="Find the matching pair">
        <canvas id="draw-canvas" class="draw-canvas"></canvas>
      </div>

      <!-- Drawing toolbar -->
      <div class="toolbar">
        <div class="color-dot active" style="background:#FF4757;" data-color="#FF4757" onclick="setColor(this)"></div>
        <div class="color-dot"        style="background:#2F86EB;" data-color="#2F86EB" onclick="setColor(this)"></div>
        <div class="color-dot"        style="background:#2ED573;" data-color="#2ED573" onclick="setColor(this)"></div>
        <div class="color-dot"        style="background:#FFD700;" data-color="#FFD700" onclick="setColor(this)"></div>
        <div class="toolbar-sep"></div>
        <button class="tool-btn" id="btn-eraser" onclick="toggleEraser()">🧹 Eraser</button>
        <button class="tool-btn btn-clear"        onclick="clearCanvas()">🗑️ Clear</button>
      </div>

      <!-- Found them button -->
      <button class="btn-found" onclick="celebrate()">🎉 Found them!</button>

      <!-- Prev / counter / Next -->
      <div class="nav-row">
        <button class="btn-nav" id="btn-prev" onclick="goTo(currentImg - 1)">◀ Prev</button>
        <div class="hw-counter" id="hw-counter">1 / 1</div>
        <button class="btn-nav" id="btn-next" onclick="goTo(currentImg + 1)">Next ▶</button>
      </div>
    </main>
  </div>

</div>

<!-- Fireworks -->
<div id="fireworks-overlay" style="pointer-events:none; background:transparent !important;"></div>

<script>
let HOMEWORKS  = [];
let currentHW  = 0;
let currentImg = 0;
let stars      = 0;

// ── Drawing state ──
const PEN_SIZE    = 5;
const ERASER_SIZE = 26;
let penColor  = '#FF4757';
let isEraser  = false;
let isDrawing = false;
let strokes   = [];
let curStroke = null;
let canvas, ctx;

// ── Load a set from the sidebar ──
function loadHomework(idx) {
  if (idx < 0 || idx >= HOMEWORKS.length) return;
  currentHW  = idx;
  currentImg = 0;
  stars      = 0;
  document.getElementById('star-count').textContent = '0';
  saveProgress('lesson8', idx);
  renderSidebar(HOMEWORKS, currentHW, loadHomework);
  loadImage();
  updateNav();
}

// ── Load scene image ──
function loadImage() {
  const src = HOMEWORKS[currentHW].images[currentImg];
  const img = document.getElementById('scene-img');
  strokes   = [];
  curStroke = null;

  img.onload = () => {
    requestAnimationFrame(() => {
      sizeCanvas();
      redraw();
    });
  };
  img.src = src;
  if (img.complete && img.naturalWidth) { img.onload = null; sizeCanvas(); redraw(); }
}

// ── Size canvas to match rendered image ──
function sizeCanvas() {
  const img  = document.getElementById('scene-img');
  const rect = img.getBoundingClientRect();
  if (rect.width === 0) return;
  canvas.width  = Math.round(rect.width);
  canvas.height = Math.round(rect.height);
}

// ── Redraw all strokes ──
function redraw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  [...strokes, ...(curStroke ? [curStroke] : [])].forEach(s => drawStroke(s));
}

function drawStroke(s) {
  if (!s.points.length) return;
  ctx.save();
  ctx.globalCompositeOperation = s.eraser ? 'destination-out' : 'source-over';
  ctx.strokeStyle = s.eraser ? 'rgba(0,0,0,1)' : s.color;
  ctx.lineWidth   = s.size;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
  ctx.beginPath();
  ctx.moveTo(s.points[0].x * canvas.width, s.points[0].y * canvas.height);
  for (let i = 1; i < s.points.length; i++) {
    ctx.lineTo(s.points[i].x * canvas.width, s.points[i].y * canvas.height);
  }
  if (s.points.length === 1) {
    ctx.arc(s.points[0].x * canvas.width, s.points[0].y * canvas.height, s.size / 2, 0, Math.PI * 2);
    ctx.fill();
  } else {
    ctx.stroke();
  }
  ctx.restore();
}

function relPos(e) {
  const r  = canvas.getBoundingClientRect();
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  return {
    x: Math.max(0, Math.min(1, (cx - r.left) / r.width)),
    y: Math.max(0, Math.min(1, (cy - r.top)  / r.height))
  };
}

// ── Pointer handlers ──
function onDown(e) {
  e.preventDefault();
  isDrawing = true;
  const pos = relPos(e);
  curStroke = { points: [pos], color: penColor, size: isEraser ? ERASER_SIZE : PEN_SIZE, eraser: isEraser };
  SFX.draw();
  redraw();
}

function onMove(e) {
  e.preventDefault();
  if (!isDrawing || !curStroke) return;
  const pos  = relPos(e);
  const last = curStroke.points[curStroke.points.length - 1];
  if (Math.abs(pos.x - last.x) < 0.002 && Math.abs(pos.y - last.y) < 0.002) return;
  curStroke.points.push(pos);
  redraw();
}

function onUp() {
  if (!isDrawing) return;
  isDrawing = false;
  if (curStroke && curStroke.points.length) strokes.push(curStroke);
  curStroke = null;
  redraw();
}

// ── Tool controls ──
function setColor(dot) {
  penColor = dot.dataset.color;
  isEraser = false;
  document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
  dot.classList.add('active');
  document.getElementById('btn-eraser').classList.remove('active');
}

function toggleEraser() {
  isEraser = !isEraser;
  document.getElementById('btn-eraser').classList.toggle('active', isEraser);
  document.querySelectorAll('.color-dot').forEach(d =>
    d.classList.toggle('active', !isEraser && d.dataset.color === penColor));
  SFX.click();
}

function clearCanvas() {
  strokes = []; curStroke = null;
  SFX.click();
  redraw();
}

// ── Found them! ──
function celebrate() {
  stars++;
  document.getElementById('star-count').textContent = stars;
  SFX.celebrate();
  const overlay = document.getElementById('fireworks-overlay');
  overlay.classList.add('show');
  spawnFireworks();
  setTimeout(() => { overlay.classList.remove('show'); overlay.innerHTML = ''; }, 2500);
}

// ── Navigation ──
function goTo(idx) {
  const total = HOMEWORKS[currentHW].images.length;
  if (idx < 0 || idx >= total) return;
  SFX.click();
  currentImg = idx;
  loadImage();
  updateNav();
}

function updateNav() {
  const total = HOMEWORKS[currentHW].images.length;
  document.getElementById('btn-prev').disabled      = currentImg === 0;
  document.getElementById('btn-next').disabled      = currentImg === total - 1;
  document.getElementById('hw-counter').textContent = `${currentImg + 1} / ${total}`;
}

// ── Init ──
document.addEventListener('DOMContentLoaded', () => {
  canvas = document.getElementById('draw-canvas');
  ctx    = canvas.getContext('2d');

  canvas.addEventListener('pointerdown', onDown, { passive: false });
  window.addEventListener('pointermove',  onMove, { passive: false });
  window.addEventListener('pointerup',    onUp);
  window.addEventListener('pointercancel', onUp);

  canvas.addEventListener('touchstart', onDown, { passive: false });
  window.addEventListener('touchmove',  onMove, { passive: false });
  window.addEventListener('touchend',   onUp,   { passive: false });

  window.addEventListener('resize', () => { sizeCanvas(); redraw(); });

  HOMEWORKS = HOMEWORK_CONFIG;
  loadHomework(getProgress('lesson8'));
});
</script>
</body>
</html>
