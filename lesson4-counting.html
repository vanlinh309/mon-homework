<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Count It Up! 🍎</title>
  <meta name="description" content="Count the objects and pick the right number — a fun counting game for kids!">
  <meta name="theme-color" content="#2ED573">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
  <script src="sounds.js"></script>
  <script src="sidebar.js"></script>
  <script src="nav.js"></script>
  <script src="assignments/lesson4.js"></script>
  <style>
    body { background: linear-gradient(135deg, #FFF9F0, #F0FFF4); }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .instruction { font-size: 1.1rem; color: #555; text-align: center; }

    /* 2×2 grid */
    .blocks-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      width: 100%;
    }

    /* Each counting block */
    .count-block {
      background: #fff;
      border-radius: 24px;
      padding: 16px 14px 14px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      transition: box-shadow 0.3s;
    }
    .count-block.solved {
      box-shadow: 0 0 0 4px var(--color-green), var(--shadow);
      background: #f4fff7;
    }
    .count-block.solved .num-choices { pointer-events: none; opacity: 0.5; }

    /* Objects area inside a block */
    .obj-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      min-height: 60px;
    }

    .obj-item {
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.2rem;
      border-radius: 12px;
      border: 2px solid #eee;
      background: #fafafa;
      cursor: pointer;
      touch-action: manipulation;
      transition: transform 0.1s, border-color 0.1s, background 0.1s;
      position: relative;
      flex-shrink: 0;
    }
    .obj-item:active { transform: scale(0.88); }
    .obj-item.counted {
      border-color: var(--color-green);
      background: #d4ffd4;
    }
    .obj-item.counted::after {
      content: '✓';
      position: absolute;
      top: -7px; right: -7px;
      background: var(--color-green);
      color: #fff;
      border-radius: 50%;
      width: 20px; height: 20px;
      font-size: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    /* Tap counter badge */
    .tap-counter {
      font-size: 1rem;
      color: var(--color-blue);
      font-weight: bold;
      background: #E8F4FF;
      border-radius: 10px;
      padding: 4px 14px;
    }

    /* Number choice buttons */
    .num-choices {
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    .num-btn {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: #fff;
      border: 3px solid #ddd;
      font-family: var(--font-main);
      font-size: 1.6rem;
      font-weight: bold;
      color: #333;
      cursor: pointer;
      touch-action: manipulation;
      transition: transform 0.1s, border-color 0.1s, box-shadow 0.1s;
      box-shadow: 0 3px 0 #ddd;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .num-btn:active, .num-btn:hover {
      transform: scale(1.08);
      border-color: var(--color-blue);
      box-shadow: 0 3px 0 var(--color-blue);
    }
    .num-btn.correct {
      border-color: var(--color-green);
      background: #d4ffd4;
      animation: flash-green 0.6s;
    }
    .num-btn.wrong {
      border-color: var(--color-red);
      background: #ffe0e0;
      animation: shake 0.5s;
    }

    /* Solved checkmark overlay */
    .solved-badge {
      display: none;
      font-size: 2rem;
    }
    .count-block.solved .solved-badge { display: block; }

    @media (max-width: 500px) {
      .obj-item { width: 54px; height: 54px; font-size: 2rem; }
      .num-btn   { width: 56px; height: 56px; font-size: 1.4rem; }
    }

    /* Image-based block */
    .count-block.img-block {
      padding: 12px 10px 10px;
      gap: 8px;
    }
    .challenge-img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: contain;
      border-radius: 12px;
      background: #f5f5f5;
      display: block;
    }
    .count-block.img-block .num-choices {
      gap: 8px;
    }
    .count-block.img-block .num-btn {
      width: 44px;
      height: 44px;
      font-size: 1.1rem;
      border-radius: 10px;
      box-shadow: 0 2px 0 #ddd;
    }
  </style>
</head>
<body class="lesson-body">

<div class="top-bar">
  <button class="btn-home" onclick="location.href='index.html'">🏠 Home</button>
  <h1>Count It Up! 🍎</h1>
  <div class="star-bar">⭐ <span id="star-count">0</span></div>
</div>

<div class="app-layout">

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <button class="sidebar-toggle" id="sidebar-toggle" onclick="toggleSidebar()">›</button>
    <div class="sidebar-inner">

      <div class="hw-list" id="hw-list"></div>
    </div>
  </div>

  <!-- Main content -->
  <div class="lesson-scroll">
    <main>
      <div class="instruction">Tap each object to count it, then pick the right number! 🔢</div>
      <div class="blocks-grid" id="blocks-grid"></div>
    </main>
  </div>

</div><!-- end app-layout -->

<!-- Fireworks -->
<div id="fireworks-overlay">
  <div class="fw-msg" id="fw-msg">🎉 You counted everything! 🌟</div>
  <button class="btn btn-blue" onclick="restartGame()" style="font-size:1.2rem;padding:16px 32px;">
    Play Again 🔄
  </button>
</div>

<script>
// Assignments are loaded from assignments/lesson4.json
// Requires a local HTTP server (not file://)
let HOMEWORKS = [];

let currentHW  = 0;
let stars      = 0;
let solvedCount = 0;
let activeBlocks = [];

function loadHomework(idx) {
  currentHW    = idx;
  stars        = 0;
  solvedCount  = 0;
  activeBlocks = HOMEWORKS[idx].blocks;
  saveProgress('lesson4', idx);
  document.getElementById('star-count').textContent = '0';
  document.getElementById('fireworks-overlay').classList.remove('show');
  renderSidebar(HOMEWORKS, currentHW, loadHomework);
  buildAll();
}

function generateChoices(correct) {
  const pool = new Set([correct]);
  const candidates = [correct - 2, correct - 1, correct + 1, correct + 2, correct + 3]
    .filter(n => n >= 1 && n !== correct);
  candidates.sort(() => Math.random() - 0.5);
  for (const n of candidates) {
    if (pool.size === 3) break;
    pool.add(n);
  }
  return [...pool].sort(() => Math.random() - 0.5);
}

function buildNumChoices(correct, numList, onCorrect, onWrong) {
  const wrap = document.createElement('div');
  wrap.className = 'num-choices';
  let answered = false;
  numList.forEach(num => {
    const btn = document.createElement('button');
    btn.className = 'num-btn';
    btn.textContent = num;
    btn.addEventListener('pointerdown', () => {
      if (answered) return;
      SFX.click();
      if (num === correct) {
        answered = true;
        btn.classList.add('correct');
        SFX.correct();
        onCorrect();
      } else {
        SFX.wrong();
        btn.classList.add('wrong');
        setTimeout(() => { btn.classList.remove('wrong'); btn.disabled = true; btn.style.opacity = '0.4'; }, 600);
        onWrong();
      }
    });
    wrap.appendChild(btn);
  });
  return wrap;
}

function buildBlock(block, index) {
  const hw = HOMEWORKS[currentHW];
  return hw.isShowFromImage
    ? buildImageBlock(block, index)
    : buildEmojiBlock(block, index);
}

function buildEmojiBlock(block, index) {
  let tapCount = 0;
  let answered = false;

  const card = document.createElement('div');
  card.className = 'count-block';
  card.id = 'block-' + index;

  const grid = document.createElement('div');
  grid.className = 'obj-grid';
  for (let i = 0; i < block.count; i++) {
    const item = document.createElement('div');
    item.className = 'obj-item';
    item.textContent = block.emoji;
    item.addEventListener('pointerdown', () => {
      if (answered) return;
      SFX.pop();
      const was = item.dataset.counted === 'true';
      item.dataset.counted = was ? 'false' : 'true';
      item.classList.toggle('counted', !was);
      tapCount += was ? -1 : 1;
      if (tapCount < 0) tapCount = 0;
      counterEl.textContent = `Counted: ${tapCount}`;
    });
    grid.appendChild(item);
  }

  const counterEl = document.createElement('div');
  counterEl.className = 'tap-counter';
  counterEl.textContent = 'Counted: 0';

  const badge = document.createElement('div');
  badge.className = 'solved-badge';
  badge.textContent = '✅ Correct!';

  const choices = buildNumChoices(block.count, generateChoices(block.count),
    () => { answered = true; card.classList.add('solved'); stars++; document.getElementById('star-count').textContent = stars; solvedCount++; if (solvedCount === activeBlocks.length) setTimeout(showFireworks, 600); },
    () => {}
  );

  card.appendChild(grid);
  card.appendChild(counterEl);
  card.appendChild(choices);
  card.appendChild(badge);
  return card;
}

function buildImageBlock(block, index) {
  const card = document.createElement('div');
  card.className = 'count-block img-block';
  card.id = 'block-' + index;

  const img = document.createElement('img');
  img.src       = block.image;
  img.alt       = 'Count the objects';
  img.className = 'challenge-img';
  card.appendChild(img);

  const badge = document.createElement('div');
  badge.className = 'solved-badge';
  badge.textContent = '✅ Correct!';

  const choices = buildNumChoices(block.answer, block.numbers,
    () => { card.classList.add('solved'); stars++; document.getElementById('star-count').textContent = stars; solvedCount++; if (solvedCount === activeBlocks.length) setTimeout(showFireworks, 600); },
    () => {}
  );

  card.appendChild(choices);
  card.appendChild(badge);
  return card;
}

function buildAll() {
  solvedCount = 0;
  const hw   = HOMEWORKS[currentHW];
  const grid = document.getElementById('blocks-grid');
  grid.innerHTML = '';
  grid.className = 'blocks-grid';
  document.querySelector('.instruction').textContent = hw.isShowFromImage
    ? 'Count the pictures and pick the right number! 🔢'
    : 'Tap each object to count it, then pick the right number! 🔢';
  activeBlocks.forEach((b, i) => grid.appendChild(buildBlock(b, i)));
}

function showFireworks() {
  SFX.celebrate();
  document.getElementById('fw-msg').textContent =
    `🎉 You got ${stars} stars! Amazing! 🌟`;
  document.getElementById('fireworks-overlay').classList.add('show');
  spawnFireworks();
}

// spawnFireworks is provided globally by nav.js

function restartGame() {
  document.getElementById('fireworks-overlay').classList.remove('show');
  stars = 0;
  document.getElementById('star-count').textContent = '0';
  loadHomework(currentHW);
}

// Init
HOMEWORKS = HOMEWORK_CONFIG;
loadHomework(getProgress('lesson4'));
</script>
</body>
</html>
