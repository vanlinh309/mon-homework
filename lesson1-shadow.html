<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Shadow Match 🚌</title>
  <meta name="description" content="Match each object to its shadow by drawing a line — a fun game for kids!">
  <meta name="theme-color" content="#2F86EB">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
  <script src="sounds.js"></script>
  <script src="sidebar.js"></script>
  <script src="nav.js"></script>
  <script src="assignments/lesson1.js"></script>
  <style>
    body { background: linear-gradient(135deg, #FFF9F0, #F5F0FF); }

    main {
      max-width: 960px;
      margin: 0 20px;
      padding: 10px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      height: 100%;
    }

    .instruction { font-size: 1.1rem; color: #555; text-align: center; }
    .round-label  { font-size: 1rem; color: #888; }

    .game-wrap {
      position: relative;
      width: 100%;
      flex: 1;
      display: flex;
      align-items: stretch;
      min-height: 0;
    }
    .col {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: normal;
      gap: 8px;
    }
    #col-objects {
      align-items: flex-start;
      padding: 8px 4px 8px 12px;
    }
    #col-shadows {
      align-items: flex-end;
      padding: 8px 12px 8px 4px;
    }
    .item-box {
      width: 180px;
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      border: none;
      background: transparent;
      position: relative;
      touch-action: none;
      transition: box-shadow 0.2s;
      flex-shrink: 0;
    }
    .item-box img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 10px;
      display: block;
      pointer-events: none;
    }
    .object-item { cursor: grab; }
    .object-item:active { cursor: grabbing; }
    .item-box.highlight       { box-shadow: 0 0 0 4px rgba(47,134,235,0.35); }
    .item-box.matched-correct { box-shadow: 0 0 0 4px rgba(46,213,115,0.5); animation: flash-green 0.6s ease; }

    #line-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }
    .feedback { margin: 0; }
    .next-btn { display: none; }
    .next-btn.show { display: inline-flex; }

    /* Color-word right column items */
    .color-word-item {
      border-radius: 16px !important;
      background: rgba(255,255,255,0.35);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .color-word-item span {
      font-size: 1.6rem;
      font-weight: bold;
      text-shadow: 0 1px 3px rgba(0,0,0,0.15);
      font-family: 'Comic Sans MS', 'Chalkboard SE', 'Arial Rounded MT Bold', cursive;
      text-transform: capitalize;
      pointer-events: none;
      user-select: none;
    }

    @media (max-width: 600px) { .item-box { width: 120px; height: 95px; } .color-word-item span { font-size: 1.2rem; } }
    @media (max-width: 400px) { .item-box { width: 95px; height: 75px; } .color-word-item span { font-size: 1rem; } }
  </style>
</head>
<body class="lesson-body">

<div class="top-bar">
  <button class="btn-home" onclick="location.href='index.html'">🏠 Home</button>
  <h1>Shadow Match 🚌</h1>
  <div class="star-bar">⭐ <span id="star-count">0</span></div>
</div>

<div class="app-layout">

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <button class="sidebar-toggle" id="sidebar-toggle" onclick="toggleSidebar()">›</button>
    <div class="sidebar-inner">

      <div class="hw-list" id="hw-list"></div>
    </div>
  </div>

  <!-- Main content -->
  <div class="lesson-scroll no-scroll">
    <main>
      <div class="instruction">Drag a line from the picture to its shadow! 🖊️</div>
      <div class="round-label" id="round-label">Round 1 of 3</div>
      <div class="feedback" id="feedback"></div>

      <div class="game-wrap" id="game-wrap">
        <canvas id="line-canvas"></canvas>
        <div class="col" id="col-objects"></div>
        <div class="col" id="col-shadows"></div>
      </div>

      <button class="btn btn-blue next-btn" id="next-btn" onclick="nextRound()">Next ➡️</button>
    </main>
  </div>

</div><!-- end app-layout -->

<!-- Fireworks -->
<div id="fireworks-overlay">
  <div class="fw-msg" id="fw-msg">🎉 All matched! ⭐</div>
  <button class="btn btn-blue" onclick="restartGame()" style="font-size:1.2rem;padding:16px 32px;">
    Play Again 🔄
  </button>
</div>

<script>
// Assignments are loaded from assignments/lesson1.json
// Requires a local HTTP server (not file://)
let HOMEWORKS = [];

function imgPath(hw, name, isShadow) {
  return `${hw.folder}/${isShadow ? 's' : 'o'}${name}.png`;
}

const TOTAL_ROUNDS = 3;
let currentHW    = 0;
let currentRound = 0;
let stars        = 0;
let pairs        = [];
let shadowOrder  = [];
let matched      = {};
let totalMatched = 0;
let dragging     = false;
let dragFromId   = null;
let dragStart    = { x: 0, y: 0 };

const canvas = document.getElementById('line-canvas');
const ctx    = canvas.getContext('2d');

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

// ---- Sidebar ----
function loadHomework(idx) {
  currentHW    = idx;
  currentRound = 0;
  stars        = 0;
  saveProgress('lesson1', idx);
  document.getElementById('star-count').textContent = '0';
  document.getElementById('fireworks-overlay').classList.remove('show');
  renderSidebar(HOMEWORKS, currentHW, loadHomework);
  showRound();
}

// ---- Round logic ----
function showRound() {
  matched      = {};
  totalMatched = 0;
  dragging     = false;
  dragFromId   = null;

  const hw = HOMEWORKS[currentHW];
  const isColorWord = hw.type === 'color-word';

  // Normalise pairs: support both string IDs and {id, color, colorHex} objects
  pairs = shuffle(hw.pairs.map(p =>
    typeof p === 'string' ? { id: p, name: p } : { id: p.id, name: p.id, img: p.img, color: p.color, colorHex: p.colorHex }
  ));
  shadowOrder = shuffle(pairs.map(p => p.id));

  // Dynamic instruction
  document.querySelector('.instruction').textContent = isColorWord
    ? 'Match the picture to its color word! 🎨'
    : 'Drag a line from the picture to its shadow! 🖊️';

  document.getElementById('round-label').textContent =
    `Round ${currentRound + 1} of ${TOTAL_ROUNDS}`;
  document.getElementById('next-btn').classList.remove('show');
  clearFeedback();

  // Left column — always images
  const colObj = document.getElementById('col-objects');
  colObj.innerHTML = '';
  pairs.forEach(p => {
    const box = document.createElement('div');
    box.className = 'item-box object-item';
    box.id = 'obj-' + p.id;
    box.dataset.pairId = p.id;
    const img = document.createElement('img');
    img.src = isColorWord ? `${hw.folder}/${p.img}` : imgPath(hw, p.name, false);
    img.alt = p.name;
    img.draggable = false;
    box.appendChild(img);
    colObj.appendChild(box);
  });

  // Right column — shadow images OR color word labels
  const colSh = document.getElementById('col-shadows');
  colSh.innerHTML = '';
  shadowOrder.forEach(id => {
    const p = pairs.find(x => x.id === id);
    const box = document.createElement('div');
    box.id = 'shd-' + id;
    box.dataset.pairId = id;

    if (isColorWord) {
      box.className = 'item-box shadow-item color-word-item';
      const span = document.createElement('span');
      span.textContent = p.color || id;
      span.style.color = p.colorHex || '#333';
      box.appendChild(span);
    } else {
      box.className = 'item-box shadow-item';
      const img = document.createElement('img');
      img.src = imgPath(hw, p.name, true);
      img.alt = p.name + ' shadow';
      img.draggable = false;
      box.appendChild(img);
    }

    colSh.appendChild(box);
  });

  resizeCanvas();
  redrawLines();
}

// ---- Canvas helpers ----
function resizeCanvas() {
  const wrap = document.getElementById('game-wrap');
  canvas.width  = wrap.offsetWidth;
  canvas.height = wrap.offsetHeight;
}
function centerOf(el) {
  const wrapRect = document.getElementById('game-wrap').getBoundingClientRect();
  const r = el.getBoundingClientRect();
  return { x: r.left - wrapRect.left + r.width/2, y: r.top - wrapRect.top + r.height/2 };
}
function drawLine(s, e, color, width) {
  ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(e.x, e.y);
  ctx.strokeStyle = color; ctx.lineWidth = width; ctx.lineCap = 'round'; ctx.stroke();
}
function redrawLines(tempStart, tempEnd) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  Object.keys(matched).forEach(id => {
    const o = document.getElementById('obj-' + id);
    const s = document.getElementById('shd-' + id);
    if (o && s) drawLine(centerOf(o), centerOf(s), '#2ED573', 5);
  });
  if (tempStart && tempEnd) drawLine(tempStart, tempEnd, 'rgba(47,134,235,0.75)', 5);
}

// ---- Pointer events ----
const wrap = document.getElementById('game-wrap');

wrap.addEventListener('pointerdown', e => {
  const target = e.target.closest('.object-item');
  if (!target || matched[target.dataset.pairId]) return;
  SFX.click(); SFX.drag();
  dragging   = true;
  dragFromId = target.dataset.pairId;
  dragStart  = centerOf(target);
  target.classList.add('highlight');
  wrap.setPointerCapture(e.pointerId);
  e.preventDefault();
});

wrap.addEventListener('pointermove', e => {
  if (!dragging) return;
  const wRect = wrap.getBoundingClientRect();
  redrawLines(dragStart, { x: e.clientX - wRect.left, y: e.clientY - wRect.top });
  e.preventDefault();
});

wrap.addEventListener('pointerup', e => {
  if (!dragging) return;
  dragging = false;
  const fromEl = document.getElementById('obj-' + dragFromId);
  if (fromEl) fromEl.classList.remove('highlight');

  const x = e.clientX, y = e.clientY;
  let hitId = null;
  document.querySelectorAll('.shadow-item').forEach(el => {
    const r = el.getBoundingClientRect();
    if (x >= r.left && x <= r.right && y >= r.top && y <= r.bottom) hitId = el.dataset.pairId;
  });

  if (hitId === dragFromId) {
    SFX.correct();
    matched[dragFromId] = true;
    totalMatched++;
    document.getElementById('obj-' + dragFromId).classList.add('matched-correct');
    document.getElementById('shd-' + dragFromId).classList.add('matched-correct');
    stars++;
    document.getElementById('star-count').textContent = stars;
    showFeedback(randomCorrect(), 'correct');
    redrawLines();
    if (totalMatched === pairs.length) {
      setTimeout(() => {
        SFX.celebrate();
        document.getElementById('next-btn').classList.add('show');
        showFeedback('All matched! Amazing! 🌟', 'correct');
      }, 400);
    }
  } else if (hitId) {
    SFX.wrong();
    const toEl = document.getElementById('shd-' + hitId);
    redrawLines();
    drawLine(dragStart, centerOf(toEl), '#FF4757', 5);
    showFeedback(randomWrong(), 'wrong');
    setTimeout(() => { redrawLines(); clearFeedback(); }, 700);
  } else {
    redrawLines();
  }
  dragFromId = null;
});

// ---- Feedback ----
function showFeedback(msg, type) {
  const el = document.getElementById('feedback');
  el.textContent = msg;
  el.className = `feedback ${type} show`;
  if (type === 'wrong') setTimeout(() => el.classList.remove('show'), 1500);
}
function clearFeedback() {
  const el = document.getElementById('feedback');
  el.textContent = ''; el.className = 'feedback';
}

// ---- Navigation ----
function nextRound() {
  currentRound++;
  if (currentRound >= TOTAL_ROUNDS) {
    SFX.celebrate();
    document.getElementById('fw-msg').textContent = `🎉 You matched everything! ${stars} stars! 🌟`;
    document.getElementById('fireworks-overlay').classList.add('show');
    spawnFireworks();
  } else {
    showRound();
  }
}
function restartGame() {
  document.getElementById('fireworks-overlay').classList.remove('show');
  currentRound = 0; stars = 0;
  document.getElementById('star-count').textContent = '0';
  showRound();
}
window.addEventListener('resize', () => { resizeCanvas(); redrawLines(); });

// Init
HOMEWORKS = HOMEWORK_CONFIG;
loadHomework(getProgress('lesson1'));
</script>
</body>
</html>
