<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Help Bunny Find the Carrot! 🐰</title>
  <meta name="description" content="Guide the bunny to the carrot by picking the right path!">
  <meta name="theme-color" content="#FF7F50">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
  <script src="sounds.js"></script>
  <script src="sidebar.js"></script>
  <script src="nav.js"></script>
  <script src="assignments/lesson9_PathFinding.js"></script>
  <style>
    body { background: linear-gradient(135deg, #FFFBE6 0%, #FFF0FB 100%); }

    main {
      max-width: 580px;
      margin: 0 auto;
      padding: 12px 14px 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .instruction {
      font-size: 1.2rem;
      color: #555;
      text-align: center;
      font-weight: bold;
    }

    /* ── Progress dots ── */
    .progress {
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    .dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #ddd;
      transition: background 0.3s, transform 0.2s;
    }
    .dot.done    { background: var(--color-green); }
    .dot.current { background: var(--color-orange); transform: scale(1.25); }

    /* ── 3×3 Grid — spreadsheet / chessboard style ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0;
      background: #fff;
      border-radius: 16px;
      box-shadow: var(--shadow);
      border: 3px solid #b0a090;
      overflow: hidden;
      width: min(360px, 90vw);
    }

    .cell {
      width: calc(min(360px, 90vw) / 3);
      height: calc(min(360px, 90vw) / 3);
      background: #FFFDF5;
      border-right: 2px solid #b0a090;
      border-bottom: 2px solid #b0a090;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.2rem;
      line-height: 1;
      transition: background 0.2s, transform 0.15s;
      position: relative;
    }

    /* Remove right border on last column, bottom border on last row */
    .cell:nth-child(3n)   { border-right: none; }
    .cell:nth-child(n+7)  { border-bottom: none; }


    .cell.active-bunny {
      background: rgba(46, 213, 115, 0.35) !important;
      transform: scale(1.08);
      z-index: 1;
    }

    .cell.flash-error {
      animation: cell-error-flash 0.45s ease;
    }

    @keyframes cell-error-flash {
      0%   { background: inherit; }
      35%  { background: rgba(255, 71, 87, 0.55) !important; }
      100% { background: inherit; }
    }

    /* ── Round nav buttons ── */
    .round-nav {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
    }

    .btn-nav {
      min-width: 110px;
      min-height: 48px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: bold;
      padding: 10px 18px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      touch-action: manipulation;
      box-shadow: var(--shadow);
      transition: transform 0.15s, opacity 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-nav:active { transform: scale(0.95); }
    .btn-nav:disabled { opacity: 0.35; cursor: default; }

    .btn-prev { background: linear-gradient(135deg, #b0a0ff, var(--color-purple)); color: #fff; }
    .btn-next-nav { background: linear-gradient(135deg, #FFD700, #FF7F50); color: #fff; }

    /* ── Options below grid ── */
    .options-label {
      font-size: 0.95rem;
      color: #888;
      font-weight: bold;
      text-align: center;
      width: min(360px, 90vw);
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: min(360px, 90vw);
    }

    .option-card {
      width: 100%;
      /* background: #fff; */
      border-radius: 16px;
      /* border: 3px solid #e8ddd0; */
      padding: 10px 14px;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      touch-action: manipulation;
      user-select: none;
      /* transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s, opacity 0.2s; */
      /* box-shadow: var(--shadow); */
      min-height: 62px;
      /* box-sizing: border-box; */
    }

    .option-card:not(.disabled):not(.correct):not(.wrong):hover {
      transform: scale(1.03);
      border-color: var(--color-purple);
    }

    .option-card:not(.disabled):not(.correct):not(.wrong):active {
      transform: scale(0.97);
    }

    .option-card.selected {
      border-color: var(--color-purple);
      background: rgba(168, 85, 247, 0.08);
    }

    .option-card.correct {
      border-color: var(--color-green);
      background: rgba(46, 213, 115, 0.15);
    }

    .option-card.wrong {
      border-color: var(--color-red);
      background: rgba(255, 71, 87, 0.07);
      opacity: 0.4;
      pointer-events: none;
    }

    .option-card.disabled { pointer-events: none; }

    .option-letter {
      font-size: 1rem;
      font-weight: bold;
      color: #bbb;
      min-width: 18px;
    }

    /* ── Arrow blocks row ── */
    .arrow-blocks {
      display: flex;
      flex-direction: row;
      gap: 6px;
      flex-wrap: wrap;
    }

    .arrow-block {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      /* background: var(--color-purple); */
      color: #fff;
      font-size: 2.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      /* box-shadow: 0 3px 6px rgba(168,85,247,0.35); */
      flex-shrink: 0;
      margin-right: 10px;
    }

    .option-card.correct .arrow-block {
      background: var(--color-green);
      box-shadow: 0 3px 6px rgba(46,213,115,0.35);
    }

    .option-card.wrong .arrow-block {
      background: #ccc;
      box-shadow: none;
    }

    /* ── Next Round button ── */
    .btn-next {
      display: none;
      min-width: 170px;
      min-height: 62px;
      font-family: inherit;
      font-size: 1.25rem;
      font-weight: bold;
      padding: 14px 28px;
      background: linear-gradient(135deg, var(--color-green), #27ae60);
      color: #fff;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: var(--shadow);
      touch-action: manipulation;
      transition: transform 0.15s;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-next.show {
      display: inline-flex;
      animation: bounce-in 0.4s ease both;
    }

    .btn-next:active { transform: scale(0.96); }

    /* ── Fireworks ── */
    #fireworks-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
      overflow: hidden;
    }

    .firework-circle {
      position: absolute;
      border-radius: 50%;
      animation: fw-pop 0.85s ease-out forwards;
    }

    @keyframes fw-pop {
      0%   { transform: scale(0);   opacity: 1; }
      100% { transform: scale(4.5); opacity: 0; }
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .option-card { min-height: 54px; padding: 8px 10px; }
      .arrow-block { width: 38px; height: 38px; font-size: 1.3rem; }
    }

    @media (max-width: 360px) {
      .cell        { font-size: 2rem; }
      .arrow-block { width: 32px; height: 32px; font-size: 1.1rem; }
    }
  </style>
</head>
<body class="lesson-body">

<div class="top-bar">
  <button class="btn-home" onclick="location.href='index.html'">🏠 Home</button>
  <h1>Help Bunny! 🐰🥕</h1>
  <div class="star-bar">⭐ <span id="star-count">0</span></div>
</div>

<div class="app-layout">
  <div class="sidebar" id="sidebar">
    <button class="sidebar-toggle" id="sidebar-toggle" onclick="toggleSidebar()">›</button>
    <div class="sidebar-inner">
      <div class="sidebar-title">Homework</div>
      <div class="hw-list" id="hw-list"></div>
    </div>
  </div>

  <div class="lesson-scroll">
    <main>
      <div class="round-nav">
        <button class="btn-nav btn-prev" id="btn-prev" onclick="prevRound()">◀ Previous</button>
        <div class="progress" id="progress"></div>
        <button class="btn-nav btn-next-nav" id="btn-nav-next" onclick="nextRound()">Next ▶</button>
      </div>

      <div class="grid" id="grid"></div>      
      <div class="options" id="options"></div>

      <div id="feedback" class="feedback"></div>

      <button class="btn-next" id="btn-next" onclick="nextRound()">Next Round ➡️</button>
    </main>
  </div>
</div>

<div id="fireworks-overlay"></div>

<script>
// ============================================================
//  Direction definitions
// ============================================================
const DIRS = {
  UP:    { dr: -1, dc:  0, arrow: '⬆️' },
  DOWN:  { dr:  1, dc:  0, arrow: '⬇️' },
  LEFT:  { dr:  0, dc: -1, arrow: '⬅️' },
  RIGHT: { dr:  0, dc:  1, arrow: '➡️' },
};
// ============================================================
//  State
// ============================================================
let currentHWIdx   = 0;
let currentRoundIdx = 0;
let stars          = 0;
let locked         = false;
let bunnyPos       = [0, 0];
let carrotPos      = [2, 2];

function hw()    { return HOMEWORK_CONFIG[currentHWIdx]; }
function round() { return hw().rounds[currentRoundIdx]; }

// ============================================================
//  Initialise
// ============================================================
function init() {
  renderSidebar(HOMEWORK_CONFIG, currentHWIdx, (idx) => {
    currentHWIdx    = idx;
    currentRoundIdx = 0;
    stars           = 0;
    document.getElementById('star-count').textContent = 0;
    loadRound();
    toggleSidebar();
  });
  loadRound();
}

// ============================================================
//  Load a round
// ============================================================
function loadRound() {
  locked = false;
  document.getElementById('btn-next').classList.remove('show');
  document.getElementById('feedback').className = 'feedback';

  const r = round();
  bunnyPos  = [...r.bunny];
  carrotPos = [...r.carrot];

  const options = round().options;

  renderGrid();
  renderProgress();
  renderOptions(options);
  updateNavButtons();
}

// ============================================================
//  Grid
// ============================================================
function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  for (let r = 0; r < 3; r++) {
    for (let c = 0; c < 3; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.id = `cell-${r}-${c}`;
      if (r === bunnyPos[0]  && c === bunnyPos[1])  cell.textContent = '🐰';
      if (r === carrotPos[0] && c === carrotPos[1]) cell.textContent = '🥕';
      grid.appendChild(cell);
    }
  }
}

function cellEl(r, c) { return document.getElementById(`cell-${r}-${c}`); }

function setCellContent(r, c) {
  // Restore a cell to its "neutral" content after the bunny leaves it
  const el = cellEl(r, c);
  el.textContent = (r === carrotPos[0] && c === carrotPos[1]) ? '🥕' : '';
  el.classList.remove('active-bunny');
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

// ============================================================
//  Options rendering
// ============================================================
function renderOptions(options) {
  const container = document.getElementById('options');
  container.innerHTML = '';

  options.forEach((opt, i) => {
    const card = document.createElement('div');
    card.className = 'option-card';
    card.id = `opt-${i}`;

    const letter = document.createElement('div');
    letter.className = 'option-letter';
    letter.textContent = String.fromCharCode(65 + i); // A B C

    const blocks = document.createElement('div');
    blocks.className = 'arrow-blocks';
    opt.moves.forEach(m => {
      const blk = document.createElement('div');
      blk.className = 'arrow-block';
      blk.textContent = DIRS[m].arrow;
      blocks.appendChild(blk);
    });

    card.appendChild(letter);
    card.appendChild(blocks);
    card.addEventListener('pointerdown', () => {
      if (locked) return;
      SFX.click();
      animateAndCheck(i, opt);
    });
    container.appendChild(card);
  });
}

// ============================================================
//  Animation + answer check
// ============================================================
async function animateAndCheck(idx, opt) {
  locked = true;
  const card = document.getElementById(`opt-${idx}`);
  card.classList.add('selected', 'disabled');

  let ar = bunnyPos[0];
  let ac = bunnyPos[1];

  for (const move of opt.moves) {
    const { dr, dc } = DIRS[move];
    const nr = ar + dr;
    const nc = ac + dc;

    if (nr < 0 || nr > 2 || nc < 0 || nc > 2) {
      // Out of bounds
      const cell = cellEl(ar, ac);
      cell.classList.add('flash-error');
      SFX.wrong();
      await sleep(120);
      showFeedback("Oops! The bunny fell off! 🐰 Try again!", 'wrong');
      await sleep(1400);
      cell.classList.remove('flash-error');
      card.classList.replace('selected', 'wrong');
      renderGrid();
      locked = false;
      return;
    }

    // Vacate current cell
    setCellContent(ar, ac);

    // Move bunny
    ar = nr;
    ac = nc;
    const newCell = cellEl(ar, ac);
    newCell.textContent = '🐰';
    newCell.classList.add('active-bunny');
    SFX.pop();

    await sleep(420);
  }

  // Remove highlight
  document.querySelectorAll('.cell').forEach(c => c.classList.remove('active-bunny'));

  if (ar === carrotPos[0] && ac === carrotPos[1]) {
    // ✅ Correct!
    SFX.celebrate();
    card.classList.replace('selected', 'correct');
    stars++;
    document.getElementById('star-count').textContent = stars;
    showFeedback('Great job! 🎉 The bunny found the carrot!', 'correct');
    spawnFireworks();
    await sleep(800);
    const btnNext = document.getElementById('btn-next');
    btnNext.textContent = currentRoundIdx >= hw().rounds.length - 1 ? '🏆 All Done!' : 'Next Round ➡️';
    btnNext.classList.add('show');
  } else {
    // ❌ Wrong cell
    SFX.wrong();
    cellEl(ar, ac).classList.add('flash-error');
    showFeedback("Oops! That's not the carrot! 🥕 Try again!", 'wrong');
    card.classList.replace('selected', 'wrong');
    await sleep(1300);
    cellEl(ar, ac).classList.remove('flash-error');
    renderGrid();
    locked = false;
  }
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ============================================================
//  Round navigation
// ============================================================
function nextRound() {
  const h = hw();
  currentRoundIdx = (currentRoundIdx + 1) % h.rounds.length;
  loadRound();
}

function prevRound() {
  const h = hw();
  currentRoundIdx = (currentRoundIdx - 1 + h.rounds.length) % h.rounds.length;
  loadRound();
}

function updateNavButtons() {
  document.getElementById('btn-prev').disabled     = currentRoundIdx === 0;
  document.getElementById('btn-nav-next').disabled = currentRoundIdx === hw().rounds.length - 1;
}

// ============================================================
//  Progress dots
// ============================================================
function renderProgress() {
  const c = document.getElementById('progress');
  c.innerHTML = '';
  hw().rounds.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot' +
      (i < currentRoundIdx ? ' done' : i === currentRoundIdx ? ' current' : '');
    c.appendChild(dot);
  });
}

// ============================================================
//  Feedback
// ============================================================
function showFeedback(msg, type) {
  const el = document.getElementById('feedback');
  el.textContent = msg;
  el.className = `feedback ${type} show`;
  if (type === 'wrong') setTimeout(() => el.classList.remove('show'), 2200);
}

// ============================================================
//  Fireworks
// ============================================================
function spawnFireworks() {
  const overlay = document.getElementById('fireworks-overlay');
  const colors  = ['#FF4757','#FFD700','#2ED573','#2F86EB','#A855F7','#FF69B4','#FF7F50','#4ECDC4'];
  for (let i = 0; i < 22; i++) {
    setTimeout(() => {
      const fw  = document.createElement('div');
      fw.className = 'firework-circle';
      const sz  = 18 + Math.random() * 22;
      fw.style.cssText = [
        `left:${8 + Math.random() * 84}%`,
        `top:${8 + Math.random() * 72}%`,
        `width:${sz}px`,
        `height:${sz}px`,
        `background:${colors[Math.floor(Math.random() * colors.length)]}`,
      ].join(';');
      overlay.appendChild(fw);
      setTimeout(() => fw.remove(), 950);
    }, i * 70);
  }
}

// ============================================================
//  Boot
// ============================================================
window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
