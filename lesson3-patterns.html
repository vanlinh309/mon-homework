<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Pattern Power 🔴</title>
  <link rel="stylesheet" href="style.css">
  <script src="sounds.js"></script>
  <script src="sidebar.js"></script>
  <script src="nav.js"></script>
  <script src="assignments/lesson3.js"></script>
  <style>
    body { background: linear-gradient(135deg, #FFF9F0, #FFFDE7); }

    main {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .instruction {
      font-size: 1.3rem;
      color: #555;
      text-align: center;
    }

    /* Pattern Row */
    .pattern-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: #fff;
      border-radius: 24px;
      box-shadow: var(--shadow);
      min-height: 120px;
      width: 100%;
    }

    .shape-item {
      width: 72px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
    }

    .missing-slot {
      width: 72px;
      height: 72px;
      border: 4px dashed #ccc;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: #bbb;
      background: #fafafa;
    }

    /* Choices */
    .choices {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .choice-btn {
      width: 100px;
      height: 100px;
      background: #fff;
      border: 3px solid #ddd;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.6rem;
      cursor: pointer;
      touch-action: manipulation;
      transition: transform 0.12s, border-color 0.12s, box-shadow 0.12s;
      box-shadow: 0 4px 0 #ddd;
    }
    .choice-btn:active, .choice-btn:hover {
      transform: scale(1.08);
      border-color: var(--color-blue);
      box-shadow: 0 4px 0 var(--color-blue);
    }
    .choice-btn.correct-pick {
      border-color: var(--color-green);
      background: #d4ffd4;
      animation: flash-green 0.6s ease;
    }
    .choice-btn.wrong-pick {
      border-color: var(--color-red);
      background: #ffe0e0;
      animation: shake 0.5s ease;
    }

    .feedback { margin: 0; }

    /* Progress */
    .progress-bar-wrap {
      width: 100%;
      background: #eee;
      border-radius: 20px;
      height: 18px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--color-green), var(--color-blue));
      border-radius: 20px;
      transition: width 0.4s ease;
    }

    .round-label {
      font-size: 1rem;
      color: #888;
    }

    .next-btn { display: none; }
    .next-btn.show { display: inline-flex; }

    /* Image-based pattern row — image + ? slot side by side */
    .pattern-row.img-mode {
      flex-wrap: nowrap;
      align-items: center;
      gap: 16px;
      padding: 16px;
    }
    .pattern-img {
      flex: 1;
      min-width: 0;
      max-height: 260px;
      object-fit: contain;
      border-radius: 12px;
      display: block;
    }
    .missing-slot.img-slot {
      width: 110px;
      height: 110px;
      flex-shrink: 0;
      font-size: 2.4rem;
      border-radius: 18px;
    }
    .missing-slot.img-slot img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 14px;
    }
    @media (max-width: 500px) {
      .missing-slot.img-slot { width: 72px; height: 72px; font-size: 1.8rem; }
    }

    /* Larger choice buttons for images */
    .choice-btn.img-choice {
      width: 140px;
      height: 140px;
      padding: 6px;
      font-size: 1rem;
    }
    .choice-btn.img-choice img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 12px;
      pointer-events: none;
    }
    @media (max-width: 500px) {
      .choice-btn.img-choice { width: 100px; height: 100px; }
    }

    /* Half-image matching mode */
    .pattern-row.matching-mode {
      position: relative;
      flex-direction: row;
      flex-wrap: nowrap;
      align-items: center;
      padding: 20px;
      gap: 28px;
      min-height: 320px;
    }
    .main-half-img {
      flex: 1;
      min-width: 0;
      max-height: 320px;
      object-fit: contain;
      border-radius: 18px;
      display: block;
      box-shadow: 0 8px 28px rgba(0,0,0,0.14);
      cursor: grab;
      position: relative;
      z-index: 2;
    }
    .main-half-img:active { cursor: grabbing; }

    /* Choice column as one rounded card */
    .match-choices-col {
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 6px 20px rgba(0,0,0,0.10);
      background: #fff;
      position: relative;
      z-index: 2;
    }
    .choice-btn.match-choice {
      width: 165px;
      height: 115px;
      padding: 8px 10px;
      border: none;
      border-bottom: 2px solid #f0f0f0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      cursor: pointer;
      touch-action: manipulation;
      transition: background 0.15s;
    }
    .choice-btn.match-choice:last-child { border-bottom: none; }
    .choice-btn.match-choice:hover     { background: #f0f5ff; }
    .choice-btn.match-choice img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 10px;
      pointer-events: none;
      display: block;
    }
    .choice-btn.match-choice.correct-pick { background: #d4ffd4; }
    .choice-btn.match-choice.wrong-pick   { background: #ffe0e0; }

    /* Canvas for drag-line drawing */
    #match-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
      border-radius: inherit;
    }

    @media (max-width: 540px) {
      .pattern-row.matching-mode { flex-direction: column; gap: 16px; padding: 14px; }
      .main-half-img { max-height: 200px; }
      .match-choices-col { flex-direction: row; border-radius: 16px; }
      .choice-btn.match-choice { width: 90px; height: 80px; border-bottom: none; border-right: 2px solid #f0f0f0; }
      .choice-btn.match-choice:last-child { border-right: none; }
    }

    /* Odd one out mode — 4 images in one row */
    .pattern-row.odd-out-mode {
      flex-direction: row;
      flex-wrap: nowrap;
      align-items: stretch;
      justify-content: center;
      gap: 10px;
      padding: 10px;
      min-height: 260px;
    }
    .choice-btn.odd-choice {
      flex: 1;
      min-width: 0;
      padding: 6px;
      border-radius: 18px;
      border: 3px solid #eee;
      background: #fff;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      cursor: pointer;
      touch-action: manipulation;
      transition: transform 0.12s, border-color 0.12s, box-shadow 0.12s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .choice-btn.odd-choice:hover {
      transform: scale(1.05);
      border-color: var(--color-blue);
      box-shadow: 0 6px 18px rgba(47,134,235,0.2);
    }
    .choice-btn.odd-choice img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 12px;
      pointer-events: none;
      display: block;
    }
    .choice-btn.odd-choice.correct-pick {
      border-color: var(--color-green);
      background: #d4ffd4;
      box-shadow: 0 0 0 4px rgba(46,213,115,0.3);
    }
    .choice-btn.odd-choice.wrong-pick {
      border-color: var(--color-red);
      background: #ffe0e0;
    }
    @media (max-width: 540px) {
      .pattern-row.odd-out-mode { gap: 8px; padding: 12px; }
      .choice-btn.odd-choice { border-radius: 12px; padding: 4px; }
    }
  </style>
</head>
<body class="lesson-body">

<div class="top-bar">
  <button class="btn-home" onclick="location.href='index.html'">🏠 Home</button>
  <h1>Pattern Power 🔴</h1>
  <div class="star-bar">⭐ <span id="star-count">0</span></div>
</div>

<div class="app-layout">

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <button class="sidebar-toggle" id="sidebar-toggle" onclick="toggleSidebar()">›</button>
    <div class="sidebar-inner">

      <div class="hw-list" id="hw-list"></div>
    </div>
  </div>

  <!-- Main content -->
  <div class="lesson-scroll">
    <main>
      <div class="round-label" id="round-label">Round 1 of 3</div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
      </div>

      <div class="instruction" id="instruction">What comes next? Find the missing piece! 🔍</div>

      <div class="pattern-row" id="pattern-row"></div>

      <div class="feedback" id="feedback"></div>

      <div class="choices" id="choices"></div>

      <button class="btn btn-blue next-btn" id="next-btn" onclick="nextRound()">Next ➡️</button>
    </main>
  </div>

</div><!-- end app-layout -->

<!-- Fireworks overlay -->
<div id="fireworks-overlay">
  <div class="fw-msg" id="fw-msg">🎉 Amazing! You finished! 🌟</div>
  <button class="btn btn-blue" onclick="restartGame()" style="font-size:1.2rem;padding:16px 32px;">
    Play Again 🔄
  </button>
</div>

<script>
// Assignments are loaded from assignments/lesson3.json
// Requires a local HTTP server (not file://)
let HOMEWORKS = [];

let currentHW    = 0;
let currentRound = 0;
let stars        = 0;
let answered     = false;
let activeRounds = [];
let matchDragAbort = null;   // AbortController for matching drag listeners

// ---- Matching drag-line mechanic ----
function setupMatchingDrag(row, round) {
  if (matchDragAbort) matchDragAbort.abort();
  matchDragAbort = new AbortController();
  const sig = matchDragAbort.signal;

  const canvas = document.getElementById('match-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');

  let dragging  = false;
  let dragStart = null;

  function resize() {
    canvas.width  = row.offsetWidth;
    canvas.height = row.offsetHeight;
  }
  resize();

  function rowPos(e) {
    const r = row.getBoundingClientRect();
    return { x: e.clientX - r.left, y: e.clientY - r.top };
  }
  function centerOf(el) {
    const rr = row.getBoundingClientRect();
    const er = el.getBoundingClientRect();
    return { x: er.left - rr.left + er.width / 2, y: er.top - rr.top + er.height / 2 };
  }
  function line(a, b, color, dash) {
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.strokeStyle = color;
    ctx.lineWidth   = 5;
    ctx.lineCap     = 'round';
    ctx.setLineDash(dash || []);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  row.addEventListener('pointerdown', e => {
    if (answered) return;
    const mainImg = row.querySelector('.main-half-img');
    const r = mainImg.getBoundingClientRect();
    if (e.clientX < r.left || e.clientX > r.right ||
        e.clientY < r.top  || e.clientY > r.bottom) return;
    dragging  = true;
    dragStart = centerOf(mainImg);
    row.setPointerCapture(e.pointerId);
    SFX.click();
    e.preventDefault();
  }, { signal: sig });

  row.addEventListener('pointermove', e => {
    if (!dragging) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    line(dragStart, rowPos(e), 'rgba(47,134,235,0.6)', [10, 6]);
    e.preventDefault();
  }, { signal: sig });

  row.addEventListener('pointerup', e => {
    if (!dragging) return;
    dragging = false;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    let hitBtn = null;
    row.querySelectorAll('.choice-btn.match-choice').forEach(btn => {
      const r = btn.getBoundingClientRect();
      if (e.clientX >= r.left && e.clientX <= r.right &&
          e.clientY >= r.top  && e.clientY <= r.bottom) hitBtn = btn;
    });
    if (!hitBtn) return;

    const src       = hitBtn.getAttribute('data-value');
    const isCorrect = src === round.answer;
    const mainImg   = row.querySelector('.main-half-img');
    const color     = isCorrect ? '#2ED573' : '#FF4757';
    line(centerOf(mainImg), centerOf(hitBtn), color);

    if (!isCorrect) setTimeout(() => ctx.clearRect(0, 0, canvas.width, canvas.height), 700);

    handleChoice(src, hitBtn);
  }, { signal: sig });

  window.addEventListener('resize', resize, { signal: sig });
}

function loadHomework(idx) {
  currentHW    = idx;
  currentRound = 0;
  stars        = 0;
  answered     = false;
  activeRounds = HOMEWORKS[idx].rounds;
  document.getElementById('star-count').textContent = '0';
  document.getElementById('fireworks-overlay').classList.remove('show');
  renderSidebar(HOMEWORKS, currentHW, loadHomework);
  showRound();
}

function showRound() {
  answered = false;
  const hw    = HOMEWORKS[currentHW];
  const round = activeRounds[currentRound];
  document.getElementById('round-label').textContent = `Round ${currentRound + 1} of ${activeRounds.length}`;
  document.getElementById('progress-bar').style.width = `${(currentRound / activeRounds.length) * 100}%`;
  document.getElementById('next-btn').classList.remove('show');

  const row       = document.getElementById('pattern-row');
  const choicesEl = document.getElementById('choices');
  row.innerHTML       = '';
  row.classList.remove('img-mode', 'matching-mode', 'odd-out-mode');
  choicesEl.innerHTML = '';

  // Update instruction text based on homework type
  const instr = document.getElementById('instruction');
  if (hw.isOddOneOut)     instr.textContent = "Which one doesn't belong? Tap the odd one out! 🤔";
  else if (hw.isMatchingHalf) instr.textContent = "Drag a line from the picture to its matching half! ✏️";
  else                    instr.textContent = "What comes next? Find the missing piece! 🔍";

  if (hw.isOddOneOut) {
    // ---- Odd one out: 4 images in a row, tap the one that doesn't belong ----
    row.classList.add('odd-out-mode');
    const shuffled = [...round.images].sort(() => Math.random() - 0.5);
    shuffled.forEach(src => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn odd-choice';
      btn.setAttribute('data-value', src);
      const img = document.createElement('img');
      img.src = src;
      img.alt = 'item';
      btn.appendChild(img);
      btn.addEventListener('pointerdown', () => handleChoice(src, btn));
      row.appendChild(btn);
    });

  } else if (hw.isMatchingHalf) {
    // ---- Half-image matching: drag line from main image to a choice ----
    row.classList.add('matching-mode');

    const mainImg = document.createElement('img');
    mainImg.src       = round.mainImage;
    mainImg.className = 'main-half-img';
    mainImg.alt       = 'Drag from here';
    row.appendChild(mainImg);

    const col = document.createElement('div');
    col.className = 'match-choices-col';
    const shuffled = [...round.choices].sort(() => Math.random() - 0.5);
    shuffled.forEach(src => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn match-choice';
      btn.setAttribute('data-value', src);
      const cImg = document.createElement('img');
      cImg.src = src;
      cImg.alt = 'choice';
      btn.appendChild(cImg);
      col.appendChild(btn);
    });
    row.appendChild(col);

    // Canvas for drag-line drawing (sits above content, pointer-events: none)
    const canvas = document.createElement('canvas');
    canvas.id = 'match-canvas';
    row.appendChild(canvas);

    setTimeout(() => setupMatchingDrag(row, round), 60);

  } else if (hw.isLoadFromImage) {
    // ---- Image-based round ----
    row.classList.add('img-mode');

    const img = document.createElement('img');
    img.src       = round.patternImage;
    img.className = 'pattern-img';
    img.alt       = 'Pattern';
    row.appendChild(img);

    const slot = document.createElement('div');
    slot.className   = 'missing-slot img-slot';
    slot.textContent = '?';
    slot.id          = 'missing-slot';
    row.appendChild(slot);

    const shuffled = [...round.choices].sort(() => Math.random() - 0.5);
    shuffled.forEach(src => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn img-choice';
      btn.setAttribute('data-value', src);
      const cImg = document.createElement('img');
      cImg.src = src;
      cImg.alt = 'choice';
      btn.appendChild(cImg);
      btn.addEventListener('pointerdown', () => handleChoice(src, btn));
      choicesEl.appendChild(btn);
    });

  } else {
    // ---- Emoji-based round ----
    round.pattern.forEach(sym => {
      if (sym === '?') {
        const slot = document.createElement('div');
        slot.className   = 'missing-slot';
        slot.textContent = '?';
        slot.id          = 'missing-slot';
        row.appendChild(slot);
      } else {
        const item = document.createElement('div');
        item.className   = 'shape-item';
        item.textContent = sym;
        row.appendChild(item);
      }
    });

    const shuffled = [...round.choices].sort(() => Math.random() - 0.5);
    shuffled.forEach(sym => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = sym;
      btn.setAttribute('data-value', sym);
      btn.addEventListener('pointerdown', () => handleChoice(sym, btn));
      choicesEl.appendChild(btn);
    });
  }

  clearFeedback();
}

function handleChoice(sym, btn) {
  if (answered) return;
  answered = true;
  SFX.click();

  const hw    = HOMEWORKS[currentHW];
  const round = activeRounds[currentRound];

  if (sym === round.answer) {
    SFX.correct();
    btn.classList.add('correct-pick');

    // Fill the missing slot (only for emoji/image pattern modes)
    if (!hw.isMatchingHalf && !hw.isOddOneOut) {
      const slot = document.getElementById('missing-slot');
      slot.style.border     = '4px solid var(--color-green)';
      slot.style.background = '#d4ffd4';
      if (hw.isLoadFromImage) {
        slot.textContent = '';
        const ansImg = document.createElement('img');
        ansImg.src = sym;
        slot.appendChild(ansImg);
      } else {
        slot.textContent = sym;
      }
    }

    stars++;
    document.getElementById('star-count').textContent = stars;
    showFeedback('Great job! ⭐', 'correct');
    document.getElementById('next-btn').classList.add('show');
  } else {
    SFX.wrong();
    btn.classList.add('wrong-pick');
    showFeedback('Try again! 🙈', 'wrong');
    setTimeout(() => {
      btn.classList.remove('wrong-pick');
      btn.disabled      = true;
      btn.style.opacity = '0.4';
      answered = false;
    }, 700);
  }
}

function showFeedback(msg, type) {
  const el = document.getElementById('feedback');
  el.textContent = msg;
  el.className = `feedback ${type} show`;
  if (type === 'correct') return;
  setTimeout(() => { el.classList.remove('show'); }, 1500);
}

function clearFeedback() {
  const el = document.getElementById('feedback');
  el.textContent = '';
  el.className = 'feedback';
}

function nextRound() {
  currentRound++;
  if (currentRound >= activeRounds.length) {
    showFireworks();
  } else {
    showRound();
  }
}

function showFireworks() {
  SFX.celebrate();
  document.getElementById('progress-bar').style.width = '100%';
  const overlay = document.getElementById('fireworks-overlay');
  overlay.classList.add('show');
  document.getElementById('fw-msg').textContent = `🎉 You got ${stars} stars! Amazing! 🌟`;
  spawnFireworks();
}

function spawnFireworks() {
  const overlay = document.getElementById('fireworks-overlay');
  const colors = ['#FF4757','#FFD700','#2ED573','#2F86EB','#A855F7','#FF69B4'];
  for (let i = 0; i < 20; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'firework-circle';
      const size = 20 + Math.random() * 40;
      c.style.cssText = `
        width: ${size}px; height: ${size}px;
        background: ${colors[Math.floor(Math.random()*colors.length)]};
        left: ${Math.random()*100}%; top: ${Math.random()*100}%;
        animation-duration: ${0.8 + Math.random()*0.8}s;
      `;
      overlay.appendChild(c);
      setTimeout(() => c.remove(), 1800);
    }, i * 80);
  }
}

function restartGame() {
  document.getElementById('fireworks-overlay').classList.remove('show');
  loadHomework(currentHW);
}

// Init
HOMEWORKS = HOMEWORK_CONFIG;
activeRounds = HOMEWORKS[0].rounds;
renderSidebar(HOMEWORKS, currentHW, loadHomework);
showRound();
</script>
</body>
</html>
