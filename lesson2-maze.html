<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Maze Adventure 🐾</title>
  <link rel="stylesheet" href="style.css">
  <script src="sounds.js"></script>
  <script src="sidebar.js"></script>
  <script src="assignments/lesson2.js"></script>
  <style>
    body { background: linear-gradient(135deg, #FFF9F0, #E8F8F0); }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 16px;
      gap: 10px;
      overflow: hidden;
      min-height: 0;
    }

    .instruction { font-size: 1rem; color: #555; text-align: center; }

    /* Controls row */
    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .tool-btn {
      min-width: 70px;
      border: 3px solid #ddd;
      font-family: var(--font-main);
      font-size: 1rem;
      cursor: pointer;
      touch-action: manipulation;
      transition: border-color 0.12s, background 0.12s, transform 0.1s;
      padding: 3px 5px;
    }
    .tool-btn.active {
      border-color: var(--color-blue);
      background: #E8F4FF;
      transform: scale(1.05);
    }
    .tool-btn:active { transform: scale(0.95); }

    /* Color dots */
    .color-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .color-label { font-size: 0.9rem; color: #666; }
    .color-dot {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 3px solid #fff;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      touch-action: manipulation;
      transition: transform 0.1s;
    }
    .color-dot.active { border-color: #333; transform: scale(1.2); }
    .color-dot:active  { transform: scale(0.9); }

    .feedback { margin: 0; }

    /* Maze container — image + canvas stacked */
    .maze-wrap {
      position: relative;
      flex: 1;
      min-height: 0;
      width: 100%;
      max-width: 740px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: var(--shadow);
      background: #fff;
      touch-action: none;
    }

    /* The maze image fills the container */
    #maze-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      display: block;
      pointer-events: none;
    }

    /* Drawing canvas sits exactly on top */
    #draw-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      cursor: crosshair;
      touch-action: none;
    }
  </style>
</head>
<body class="lesson-body">

<div class="top-bar">
  <button class="btn-home" onclick="location.href='index.html'">🏠</button>
  <h1>Maze Adventure 🐾</h1>
  <div class="star-bar">⭐ <span id="star-count">0</span></div>
</div>

<div class="app-layout">

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <button class="sidebar-toggle" id="sidebar-toggle" onclick="toggleSidebar()">›</button>
    <div class="sidebar-inner">
      <div class="sidebar-title">Homework</div>
      <div class="hw-list" id="hw-list"></div>
    </div>
  </div>

  <!-- Main content -->
  <div class="lesson-scroll no-scroll">
    <main>
      <div class="instruction">Trace a path through the maze with your finger or mouse! ✏️</div>

      <div class="controls">
        <button class="tool-btn active" id="btn-pencil" onclick="setTool('pencil')">✏️ Draw</button>
        <button class="tool-btn"        id="btn-eraser" onclick="setTool('eraser')">🧹 Erase</button>
        <button class="tool-btn"                        onclick="clearDrawing()">🗑️ Clear</button>
      </div>

      <div class="color-row">
        <span class="color-label">Color:</span>
        <div class="color-dot active" style="background:#2F86EB" data-color="#2F86EB" onclick="setColor(this)"></div>
        <div class="color-dot"        style="background:#FF4757" data-color="#FF4757" onclick="setColor(this)"></div>
        <div class="color-dot"        style="background:#2ED573" data-color="#2ED573" onclick="setColor(this)"></div>
        <div class="color-dot"        style="background:#FF7F50" data-color="#FF7F50" onclick="setColor(this)"></div>
        <div class="color-dot"        style="background:#A855F7" data-color="#A855F7" onclick="setColor(this)"></div>
        <div class="color-dot"        style="background:#FF1493" data-color="#FF1493" onclick="setColor(this)"></div>
      </div>

      <div class="feedback" id="feedback"></div>

      <div class="maze-wrap" id="maze-wrap">
        <img id="maze-img" src="assets/lesson2/animal_maze.png" alt="Maze">
        <canvas id="draw-canvas"></canvas>
      </div>
    </main>
  </div>

</div><!-- end app-layout -->

<script>
// Assignments are loaded from assignments/lesson2.json
// Requires a local HTTP server (not file://)
let HOMEWORKS = [];

let currentHW = 0;

function loadHomework(idx) {
  currentHW = idx;
  renderSidebar(HOMEWORKS, currentHW, loadHomework);
  document.getElementById('maze-img').src = HOMEWORKS[idx].image;
  clearDrawing();
}

// ---- Canvas drawing ----
const drawCanvas = document.getElementById('draw-canvas');
const ctx = drawCanvas.getContext('2d');

let tool      = 'pencil';
let drawColor = '#2F86EB';
let drawSize  = 6;
let isDrawing = false;
let lastX = 0, lastY = 0;
let drawSoundTimer = 0;

function resizeCanvas() {
  const wrap = document.getElementById('maze-wrap');
  drawCanvas.width  = wrap.clientWidth;
  drawCanvas.height = wrap.clientHeight;
}

function getPos(e) {
  const rect = drawCanvas.getBoundingClientRect();
  const scaleX = drawCanvas.width  / rect.width;
  const scaleY = drawCanvas.height / rect.height;
  return {
    x: (e.clientX - rect.left) * scaleX,
    y: (e.clientY - rect.top)  * scaleY,
  };
}

drawCanvas.addEventListener('pointerdown', e => {
  isDrawing = true;
  SFX.click();
  const pos = getPos(e);
  lastX = pos.x;
  lastY = pos.y;
  paint(pos.x, pos.y, pos.x, pos.y);
  drawCanvas.setPointerCapture(e.pointerId);
  e.preventDefault();
});

drawCanvas.addEventListener('pointermove', e => {
  if (!isDrawing) return;
  const pos = getPos(e);
  paint(lastX, lastY, pos.x, pos.y);
  lastX = pos.x;
  lastY = pos.y;
  const now = Date.now();
  if (now - drawSoundTimer > 80) { SFX.draw(); drawSoundTimer = now; }
  e.preventDefault();
});

drawCanvas.addEventListener('pointerup',     () => { isDrawing = false; });
drawCanvas.addEventListener('pointercancel', () => { isDrawing = false; });

function paint(x1, y1, x2, y2) {
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);

  if (tool === 'eraser') {
    ctx.globalCompositeOperation = 'destination-out';
    ctx.strokeStyle = 'rgba(0,0,0,1)';
    ctx.lineWidth   = 28;
  } else {
    ctx.globalCompositeOperation = 'source-over';
    ctx.strokeStyle = drawColor;
    ctx.lineWidth   = drawSize;
  }

  ctx.lineCap  = 'round';
  ctx.lineJoin = 'round';
  ctx.stroke();
}

function setTool(t) {
  tool = t;
  SFX.click();
  document.getElementById('btn-pencil').classList.toggle('active', t === 'pencil');
  document.getElementById('btn-eraser').classList.toggle('active', t === 'eraser');
}

function setColor(el) {
  drawColor = el.dataset.color;
  SFX.select();
  document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
  el.classList.add('active');
  setTool('pencil');
}

function clearDrawing() {
  SFX.click();
  ctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
}

window.addEventListener('resize', resizeCanvas);
window.addEventListener('load',   resizeCanvas);

// Init
HOMEWORKS = HOMEWORK_CONFIG;
renderSidebar(HOMEWORKS, currentHW, loadHomework);
document.getElementById('maze-img').src = HOMEWORKS[0].image;
</script>
</body>
</html>
