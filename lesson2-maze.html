<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Maze Adventure 🐾</title>
  <meta name="description" content="Draw a path through the maze to help the animal reach its goal!">
  <meta name="theme-color" content="#2ED573">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
  <script src="sounds.js"></script>
  <script src="sidebar.js"></script>
  <script src="nav.js"></script>
  <script src="assignments/lesson2.js"></script>
  <style>
    body { background: linear-gradient(135deg, #FFF9F0, #E8F8F0); }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 6px 12px;
      gap: 6px;
      overflow: hidden;
      min-height: 0;
    }

    /* Compact toolbar: tool buttons + color dots in one row */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: nowrap;
      justify-content: center;
    }

    .tool-btn {
      width: 44px;
      height: 44px;
      border: 3px solid #ddd;
      border-radius: 12px;
      background: #fff;
      font-size: 1.3rem;
      cursor: pointer;
      touch-action: manipulation;
      transition: border-color 0.12s, background 0.12s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    .tool-btn.active {
      border-color: var(--color-blue);
      background: #E8F4FF;
      transform: scale(1.08);
    }
    .tool-btn:active { transform: scale(0.92); }

    /* Divider between tool buttons and color dots */
    .toolbar-divider {
      width: 2px;
      height: 32px;
      background: #ddd;
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* Color dots */
    .color-dot {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 3px solid #fff;
      cursor: pointer;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
      touch-action: manipulation;
      transition: transform 0.1s;
      flex-shrink: 0;
    }
    .color-dot.active { border-color: #333; transform: scale(1.25); }
    .color-dot:active  { transform: scale(0.9); }

    .feedback { margin: 0; }

    /* Maze container — image + canvas stacked */
    .maze-wrap {
      position: relative;
      flex: 1;
      min-height: 0;
      width: 100%;
      max-width: 740px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: var(--shadow);
      background: #fff;
      touch-action: none;
    }

    /* The maze image fills the container */
    #maze-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      display: block;
      pointer-events: none;
    }

    /* Drawing canvas sits exactly on top */
    #draw-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      cursor: crosshair;
      touch-action: none;
    }
  </style>
</head>
<body class="lesson-body">

<div class="top-bar">
  <button class="btn-home" onclick="location.href='index.html'">🏠</button>
  <h1>Maze Adventure 🐾</h1>
  <div class="star-bar">⭐ <span id="star-count">0</span></div>
</div>

<div class="app-layout">

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <button class="sidebar-toggle" id="sidebar-toggle" onclick="toggleSidebar()">›</button>
    <div class="sidebar-inner">

      <div class="hw-list" id="hw-list"></div>
    </div>
  </div>

  <!-- Main content -->
  <div class="lesson-scroll no-scroll">
    <main>
      <div class="toolbar">
        <button class="tool-btn active" id="btn-pencil" onclick="setTool('pencil')" title="Draw">✏️</button>
        <button class="tool-btn"        id="btn-eraser" onclick="setTool('eraser')" title="Erase">🧹</button>
        <button class="tool-btn"                        onclick="clearDrawing()"    title="Clear">🗑️</button>
        <div class="toolbar-divider"></div>
        <div class="color-dot active" style="background:#2F86EB" data-color="#2F86EB" onclick="setColor(this)"></div>
        <div class="color-dot"        style="background:#FF4757" data-color="#FF4757" onclick="setColor(this)"></div>
        <div class="color-dot"        style="background:#2ED573" data-color="#2ED573" onclick="setColor(this)"></div>
        <div class="color-dot"        style="background:#FF7F50" data-color="#FF7F50" onclick="setColor(this)"></div>
        <div class="color-dot"        style="background:#A855F7" data-color="#A855F7" onclick="setColor(this)"></div>
        <div class="color-dot"        style="background:#FF1493" data-color="#FF1493" onclick="setColor(this)"></div>
      </div>

      <div class="feedback" id="feedback"></div>

      <div class="maze-wrap" id="maze-wrap">
        <img id="maze-img" src="assets/lesson2/animal_maze.png" alt="Maze">
        <canvas id="draw-canvas"></canvas>
      </div>
    </main>
  </div>

</div><!-- end app-layout -->

<script>
// Assignments are loaded from assignments/lesson2.json
// Requires a local HTTP server (not file://)
let HOMEWORKS = [];

let currentHW = 0;

function loadHomework(idx) {
  currentHW = idx;
  saveProgress('lesson2', idx);
  renderSidebar(HOMEWORKS, currentHW, loadHomework);
  document.getElementById('maze-img').src = HOMEWORKS[idx].image;
  clearDrawing();
}

// ---- Canvas drawing ----
const drawCanvas = document.getElementById('draw-canvas');
const ctx = drawCanvas.getContext('2d');

let tool      = 'pencil';
let drawColor = '#2F86EB';
let drawSize  = 6;
let isDrawing = false;
let lastX = 0, lastY = 0;
let drawSoundTimer = 0;

function resizeCanvas() {
  const wrap = document.getElementById('maze-wrap');
  const dpr  = window.devicePixelRatio || 1;
  const cssW = wrap.clientWidth;
  const cssH = wrap.clientHeight;
  if (!cssW || !cssH) return;
  drawCanvas.width  = Math.round(cssW * dpr);
  drawCanvas.height = Math.round(cssH * dpr);
  // Scale context so all drawing coordinates stay in CSS-pixel space
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function getPos(e) {
  const rect = drawCanvas.getBoundingClientRect();
  return {
    x: e.clientX - rect.left,
    y: e.clientY - rect.top,
  };
}

drawCanvas.addEventListener('pointerdown', e => {
  isDrawing = true;
  SFX.click();
  const pos = getPos(e);
  lastX = pos.x;
  lastY = pos.y;
  paint(pos.x, pos.y, pos.x, pos.y);
  drawCanvas.setPointerCapture(e.pointerId);
  e.preventDefault();
});

drawCanvas.addEventListener('pointermove', e => {
  if (!isDrawing) return;
  const pos = getPos(e);
  paint(lastX, lastY, pos.x, pos.y);
  lastX = pos.x;
  lastY = pos.y;
  const now = Date.now();
  if (now - drawSoundTimer > 80) { SFX.draw(); drawSoundTimer = now; }
  e.preventDefault();
});

drawCanvas.addEventListener('pointerup',     () => { isDrawing = false; });
drawCanvas.addEventListener('pointercancel', () => { isDrawing = false; });

function paint(x1, y1, x2, y2) {
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);

  if (tool === 'eraser') {
    ctx.globalCompositeOperation = 'destination-out';
    ctx.strokeStyle = 'rgba(0,0,0,1)';
    ctx.lineWidth   = 28;
  } else {
    ctx.globalCompositeOperation = 'source-over';
    ctx.strokeStyle = drawColor;
    ctx.lineWidth   = drawSize;
  }

  ctx.lineCap  = 'round';
  ctx.lineJoin = 'round';
  ctx.stroke();
}

function setTool(t) {
  tool = t;
  SFX.click();
  document.getElementById('btn-pencil').classList.toggle('active', t === 'pencil');
  document.getElementById('btn-eraser').classList.toggle('active', t === 'eraser');
}

function setColor(el) {
  drawColor = el.dataset.color;
  SFX.select();
  document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
  el.classList.add('active');
  setTool('pencil');
}

function clearDrawing() {
  SFX.click();
  ctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
}

// Resize when window resizes or sidebar opens/closes (ResizeObserver handles both)
if (typeof ResizeObserver !== 'undefined') {
  new ResizeObserver(() => requestAnimationFrame(resizeCanvas))
    .observe(document.getElementById('maze-wrap'));
} else {
  window.addEventListener('resize', resizeCanvas);
}
window.addEventListener('load', () => requestAnimationFrame(resizeCanvas));

// Init
HOMEWORKS = HOMEWORK_CONFIG;
loadHomework(getProgress('lesson2'));
</script>
</body>
</html>
